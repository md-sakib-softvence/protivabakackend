

services:
  
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    image: mohammadjihad/protiva-be:latest
    container_name: protiva-be_server
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/usr/src/app/uploads
      - uploads_file:/usr/src/app/uploads-file
    ports:
      - "${HOST_PORT:-3001}:3001"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: protiva-be_db
    restart: always
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: protiva-be_redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    networks:
      - app_network
    command: redis-server --appendonly yes

  # ── DB Setup (dev only: push schema + seed) ─────────────────
  db-setup:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    container_name: protiva-be_db_setup
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app_network
    # environment:
    #   - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-mydb}?schema=public
    command: >
      bash -c "
        echo '🚀 Running DB setup...';
        npx prisma generate --config prisma/prisma.config.ts;
        npx prisma db push --accept-data-loss --config prisma/prisma.config.ts;
        npx ts-node prisma/seeds/index.ts 2>/dev/null || echo '⚠️  No seed file found, skipping.';
        echo '✅ DB setup complete!';
      "

volumes:
  pgdata:
  redisdata:
  uploads:
  uploads_file:

networks:
  app_network:
    driver: bridge
